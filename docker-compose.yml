services:
  api:
    build: .
    container_name: movie_api
    restart: unless-stopped
    ports:
      - "4001:4000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: movie_user
      DB_PASSWORD: movie_pass
      DB_NAME: movie_booking
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: movie_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: movie_booking
      MYSQL_USER: movie_user
      MYSQL_PASSWORD: movie_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  db_data:

